<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Italy Trip Planner 2026 v4</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',-apple-system,'Noto Sans KR',sans-serif;background:#f5f5f5;color:#1a1a1a;line-height:1.6}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:#bbb;border-radius:3px}

.header{background:#fff;padding:20px 28px;border-bottom:2px solid #e0e0e0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.header h1{font-size:22px;color:#1a1a1a}
.header h1 .flag{font-size:26px}
.badge{background:#2563eb;color:#fff;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:700;margin-left:8px}
.header-sub{color:#666;font-size:12px}

.course-tabs{display:flex;background:#fff;border-bottom:2px solid #e0e0e0;overflow-x:auto}
.course-tab{padding:14px 28px;cursor:pointer;font-size:14px;font-weight:700;border-bottom:3px solid transparent;color:#888;transition:all .2s;white-space:nowrap}
.course-tab:hover{color:#333;background:#f9f9f9}
.course-tab.active{color:#2563eb;border-bottom-color:#2563eb;background:#f0f5ff}
.course-tab .sub{font-size:10px;font-weight:400;color:#999;display:block}
.course-tab.active .sub{color:#6b9eff}

.section-tabs{display:flex;background:#fafafa;border-bottom:1px solid #e0e0e0;overflow-x:auto}
.sec-tab{padding:10px 18px;cursor:pointer;font-size:12px;font-weight:600;color:#999;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.sec-tab:hover{color:#555}
.sec-tab.active{color:#d97706;border-bottom-color:#d97706}

.section-content{display:none}
.section-content.active{display:block}

#map{width:100%;height:45vh;min-height:300px;border-bottom:1px solid #e0e0e0}

#dayMap{width:100%;height:350px;border:1px solid #e0e0e0;border-radius:10px;margin-bottom:16px;z-index:1}
@media(min-width:769px){
  .itin-layout{display:flex;gap:16px}
  .itin-map-wrap{flex:0 0 45%;position:sticky;top:0;align-self:flex-start;max-height:100vh}
  .itin-list-wrap{flex:1;min-width:0}
}
@media(max-width:768px){
  #dayMap{height:250px}
}

.cal-wrap{padding:20px 24px;background:#fff}
.cal-wrap h3{font-size:15px;color:#333;margin-bottom:12px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:16px}
.cal-header{background:#f0f0f0;padding:6px;text-align:center;font-size:11px;font-weight:700;color:#666}
.cal-header.sun{color:#dc2626}
.cal-cell{min-height:80px;background:#fff;border:1px solid #e8e8e8;padding:4px 6px;font-size:10px;position:relative;transition:all .2s}
.cal-cell.empty{background:#fafafa;border-color:#f0f0f0}
.cal-cell.trip{background:#eff6ff;border-color:#93c5fd}
.cal-cell.trip:hover{background:#dbeafe;box-shadow:0 2px 8px rgba(37,99,235,.12)}
.cal-date{font-weight:700;font-size:12px;color:#333;margin-bottom:2px}
.cal-cell.sun .cal-date{color:#dc2626}
.cal-city{font-size:10px;font-weight:700;color:#2563eb;line-height:1.3}
.cal-detail{font-size:9px;color:#666;line-height:1.3;margin-top:1px}
.cal-transport{font-size:8px;color:#fff;background:#d97706;padding:1px 4px;border-radius:3px;display:inline-block;margin-top:2px}
.cal-nights{position:absolute;top:3px;right:4px;font-size:8px;background:#2563eb;color:#fff;padding:0 4px;border-radius:3px}

.route-section{padding:20px 24px;background:#fff;border-top:1px solid #e8e8e8}
.route-section h3{font-size:15px;margin-bottom:12px}
.route-flow{display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-bottom:16px}
.route-city{background:#eff6ff;border:1px solid #93c5fd;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;color:#1e40af}
.route-city.overnight{background:#2563eb;color:#fff;border-color:#2563eb}
.route-arrow{color:#999;font-size:14px}

.stats-row{display:flex;gap:10px;padding:16px 24px;overflow-x:auto;background:#fff;border-top:1px solid #e8e8e8}
.stat{background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:12px 16px;flex:1;min-width:120px}
.stat .label{font-size:9px;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.stat .value{font-size:18px;font-weight:800;color:#1a1a1a;margin-top:2px}
.stat .stat-sub{font-size:10px;color:#6b7280}

.transport-section{padding:20px 24px;background:#fff;border-top:1px solid #e8e8e8}
.transport-section h3{font-size:15px;margin-bottom:12px}
.t-table{width:100%;border-collapse:collapse;font-size:11px}
.t-table th{background:#f3f4f6;padding:8px 10px;text-align:left;font-size:10px;color:#6b7280;font-weight:700;border-bottom:2px solid #e5e7eb;position:sticky;top:0}
.t-table td{padding:8px 10px;border-bottom:1px solid #f3f4f6;vertical-align:top}
.t-table tr:hover{background:#f9fafb}
.t-table .day-col{font-weight:700;color:#2563eb;white-space:nowrap;width:55px}
.t-table .route-col{font-weight:600;color:#1a1a1a}
.t-table .mode-col{color:#d97706;font-weight:600}
.t-table .cost-col{color:#059669;font-weight:600;white-space:nowrap}
.book-link{display:inline-block;background:#2563eb;color:#fff;padding:2px 8px;border-radius:4px;text-decoration:none;font-size:9px;font-weight:600;transition:background .2s}
.book-link:hover{background:#1d4ed8}

.itin-section{padding:16px 24px;background:#fff;border-top:1px solid #e8e8e8}
.day-block{background:#fff;border:1px solid #e5e7eb;border-radius:10px;margin-bottom:12px;overflow:hidden}
.day-header{padding:12px 16px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;transition:background .2s}
.day-header:hover{background:#f9fafb}
.day-header.open{background:#eff6ff;border-bottom:1px solid #e0e0e0}
.day-header .left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.day-num{background:#2563eb;color:#fff;padding:2px 8px;border-radius:6px;font-size:12px;font-weight:700}
.day-date{font-size:12px;color:#666}
.day-city{font-size:14px;font-weight:700;color:#1a1a1a}
.day-theme{font-size:11px;color:#d97706;font-style:italic}
.day-route-summary{font-size:10px;color:#6b7280;display:block;width:100%;margin-top:2px}
.day-toggle{font-size:18px;color:#999;transition:transform .2s}
.day-header.open .day-toggle{transform:rotate(180deg)}
.day-body{display:none;padding:0}
.day-header.open+.day-body{display:block}
.sched-table{width:100%;border-collapse:collapse}
.sched-table td{padding:6px 12px;border-bottom:1px solid #f3f4f6;font-size:11px;vertical-align:top}
.sched-table td:first-child{width:50px;font-weight:700;color:#d97706;white-space:nowrap}
.sched-table td:nth-child(2){font-weight:600;color:#1a1a1a;min-width:140px}
.sched-table td:nth-child(3){color:#555}
.tag-food{background:#fef3c7;color:#92400e;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:600;margin-left:4px}
.tag-move{background:#dbeafe;color:#1e40af;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:600;margin-left:4px}
.tag-spot{background:#dcfce7;color:#166534;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:600;margin-left:4px}
.tag-couple{background:#fce7f3;color:#9d174d;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:600;margin-left:4px}
.tag-hotel{background:#ede9fe;color:#5b21b6;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:600;margin-left:4px}
.tag-swim{background:#e0f2fe;color:#0369a1;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:600;margin-left:4px}
.map-link{display:inline-block;background:#1a73e8;color:#fff;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:600;text-decoration:none;margin-left:4px;vertical-align:middle}
.map-link:hover{background:#1557b0}
.sched-row{cursor:pointer;transition:background .15s}
.sched-row:hover{background:#f0f5ff}
.sched-row.active-row td{background:#eff6ff;border-left:3px solid #2563eb}
.highlight-row td{background:#fff7ed}
.cost-row td{background:#f0fdf4;color:#059669 !important;font-weight:600 !important;font-size:10px !important}
.tip-row{background:#fffbeb;font-size:10px !important;color:#92400e !important}
.tip-row td{border-bottom:1px solid #fef3c7 !important}

.budget-section{padding:20px 24px;background:#fff;border-top:1px solid #e8e8e8}
.budget-section h3{font-size:15px;margin-bottom:12px}
.b-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.b-row .lbl{width:65px;font-size:11px;color:#666;text-align:right;font-weight:600}
.b-bar-wrap{flex:1;height:24px;background:#f3f4f6;border-radius:4px;overflow:hidden}
.b-bar{height:100%;border-radius:4px;display:flex;align-items:center;padding:0 8px;font-size:10px;font-weight:700;color:#fff}
.b-row .amt{width:80px;font-size:11px;color:#666}
.budget-total{margin-top:12px;padding:12px 16px;background:#f0f5ff;border-radius:8px;display:flex;justify-content:space-around;text-align:center}
.budget-total .item .val{font-size:20px;font-weight:800;color:#1e40af}
.budget-total .item .lbl{font-size:10px;color:#666}

.compare-section{padding:20px 24px;background:#fff;border-top:1px solid #e8e8e8}
.compare-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px}
.compare-card{border:2px solid #e5e7eb;border-radius:12px;padding:16px;position:relative;cursor:pointer;transition:all .2s}
.compare-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.08)}
.compare-card.current{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.compare-card .card-badge{position:absolute;top:-10px;right:12px;background:#2563eb;color:#fff;padding:2px 10px;border-radius:6px;font-size:10px;font-weight:700}
.compare-card h4{font-size:15px;margin-bottom:2px}
.compare-card .card-sub{font-size:11px;color:#666;margin-bottom:8px}
.compare-card .card-route{font-size:10px;color:#888;margin-bottom:10px;line-height:1.4}
.compare-card .pros li{font-size:11px;margin-bottom:3px;color:#059669;list-style:none}
.compare-card .cons li{font-size:11px;margin-bottom:3px;color:#dc2626;list-style:none}
.compare-card .card-price{font-size:22px;font-weight:800;color:#1a1a1a;margin:8px 0}
.compare-card .card-price small{font-size:12px;color:#666;font-weight:400}

.hotel-section{padding:20px 24px;background:#fff;border-top:1px solid #e8e8e8}
.hotel-section h3{font-size:15px;margin-bottom:16px}
.hotel-city{margin-bottom:24px}
.hotel-city h4{font-size:14px;color:#2563eb;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid #dbeafe;display:flex;align-items:center;gap:8px}
.hotel-city h4 .nights-badge{background:#2563eb;color:#fff;padding:1px 8px;border-radius:4px;font-size:10px}
.hotel-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.hotel-card{border:1px solid #e5e7eb;border-radius:10px;padding:14px;transition:all .2s}
.hotel-card:hover{box-shadow:0 2px 12px rgba(0,0,0,.08)}
.hotel-card .h-name{font-weight:700;font-size:13px;margin-bottom:4px}
.hotel-card .h-stars{color:#f59e0b;font-size:11px;margin-bottom:4px}
.hotel-card .h-desc{font-size:11px;color:#666;line-height:1.4;margin-bottom:8px}
.hotel-card .h-price{font-size:14px;font-weight:800;color:#059669;margin-bottom:8px}
.hotel-card .h-price small{font-size:10px;color:#999;font-weight:400}
.hotel-card .h-tags{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.hotel-card .h-tag{font-size:9px;padding:2px 6px;border-radius:3px;background:#f3f4f6;color:#555}
.hotel-card .h-links{display:flex;gap:6px}
.hotel-card .h-links a{display:inline-block;padding:4px 10px;border-radius:4px;font-size:10px;font-weight:600;text-decoration:none;color:#fff;background:#2563eb}
.hotel-card .h-links a:hover{background:#1d4ed8}
.hotel-card .h-links a.agoda{background:#e74c3c}
.hotel-card .h-links a.expedia{background:#f59e0b}
.hotel-tip{background:#fffbeb;border-left:4px solid #f59e0b;padding:10px 14px;border-radius:0 8px 8px 0;margin-top:8px;font-size:11px;color:#666}

footer{text-align:center;padding:16px;color:#999;font-size:10px;border-top:1px solid #e8e8e8;background:#fff}

/* ====== RESPONSIVE ====== */
@media(max-width:1024px){
  .compare-grid{grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}
  .hotel-cards{grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
}
@media(max-width:768px){
  .header{padding:14px 16px}
  .header h1{font-size:18px}
  .header h1 .flag{font-size:20px}
  .header-sub{font-size:11px}
  .course-tabs{gap:0}
  .course-tab{padding:10px 14px;font-size:12px}
  .course-tab .sub{font-size:9px}
  .section-tabs,.sec-tab{font-size:11px}
  .sec-tab{padding:8px 12px}
  #map{height:250px;min-height:200px}
  .route-section{padding:12px 14px}
  .route-flow{gap:3px}
  .route-city{padding:3px 8px;font-size:10px}
  .route-arrow{font-size:12px}
  .stats-row{flex-wrap:wrap;padding:12px 14px;gap:8px}
  .stat{min-width:calc(50% - 8px);padding:10px 12px}
  .stat .value{font-size:16px}
  .stat .label{font-size:8px}
  .cal-wrap{padding:12px 10px}
  .cal-grid{font-size:8px;gap:1px}
  .cal-cell{min-height:55px;padding:2px 3px}
  .cal-date{font-size:10px}
  .cal-city{font-size:8px}
  .cal-detail{font-size:7px}
  .cal-transport{font-size:7px;padding:0 3px}
  .cal-nights{font-size:7px;padding:0 3px}
  .itin-section{padding:12px 10px}
  .day-block{margin-bottom:8px}
  .day-header{padding:10px 12px}
  .day-header .left{gap:6px;flex-wrap:wrap}
  .day-num{font-size:10px;padding:2px 6px}
  .day-date{font-size:10px}
  .day-city{font-size:12px}
  .day-theme{font-size:10px;display:block;width:100%}
  .day-body{padding:0}
  .sched-table td{padding:5px 8px;font-size:10px}
  .sched-table td:first-child{width:42px;font-size:10px}
  .transport-section{padding:12px 10px;overflow-x:auto}
  .t-table{font-size:10px;min-width:600px}
  .t-table th{padding:6px 8px;font-size:9px}
  .t-table td{padding:6px 8px}
  .hotel-section{padding:12px 14px}
  .hotel-cards{grid-template-columns:1fr}
  .hotel-card{padding:12px}
  .hotel-city h4{font-size:13px}
  .budget-section{padding:12px 14px}
  .b-row .lbl{width:50px;font-size:10px}
  .b-bar{font-size:9px;padding:0 6px}
  .b-row .amt{font-size:10px;width:60px}
  .budget-total{flex-direction:column;gap:8px;padding:12px}
  .budget-total .item .val{font-size:18px}
  .compare-section{padding:12px 14px}
  .compare-grid{grid-template-columns:1fr}
  .compare-card{padding:12px}
  .compare-card h4{font-size:14px}
  .compare-card .card-price{font-size:18px}
}
@media(max-width:480px){
  .header h1{font-size:16px}
  .badge{font-size:9px;padding:1px 6px}
  .header-sub{font-size:10px}
  .course-tab{padding:8px 10px;font-size:11px}
  .course-tab .sub{font-size:8px}
  .sec-tab{padding:6px 10px;font-size:10px}
  #map{height:200px;min-height:180px}
  .stat{min-width:calc(50% - 6px);padding:8px}
  .stat .value{font-size:14px}
  .cal-cell{min-height:48px;padding:1px 2px}
  .cal-date{font-size:9px}
  .cal-city{font-size:7px}
  .cal-detail{display:none}
  .cal-transport{font-size:6px}
  .cal-nights{font-size:6px;top:1px;right:1px}
  .day-header .left{gap:4px}
  .day-num{font-size:9px}
  .day-city{font-size:11px}
  .sched-table td{font-size:9px;padding:4px 6px}
  .hotel-card .h-name{font-size:12px}
  .hotel-card .h-desc{font-size:10px}
  .hotel-card .h-price{font-size:13px}
  .budget-total .item .val{font-size:16px}
  .compare-card .card-price{font-size:16px}
}
@media(hover:none){
  .course-tab,.sec-tab{min-height:44px;display:flex;align-items:center;justify-content:center}
  .day-header{min-height:48px}
  .book-link,.hotel-card .h-links a{padding:6px 12px;font-size:11px}
}
</style>
</head>
<body>

<div class="header">
<div>
<h1><span class="flag">🇮🇹</span> Italy Trip Planner 2026 <span class="badge">v4</span> <span class="badge">12N 13D</span></h1>
<div class="header-sub">2026.09.16(수) ~ 09.28(월) | KE931/KE928 | Couple</div>
</div>
</div>

<div class="course-tabs" id="courseTabs"></div>
<div class="section-tabs" id="secTabs"></div>

<div class="section-content" id="sec-overview">
<div id="map"></div>
<div class="route-section"><h3 id="routeTitle">이동 경로</h3><div class="route-flow" id="routeFlow"></div></div>
<div class="stats-row" id="statsRow"></div>
</div>

<div class="section-content" id="sec-calendar">
<div class="cal-wrap"><h3>September 2026</h3><div class="cal-grid" id="calGrid"></div></div>
</div>

<div class="section-content" id="sec-itinerary">
<div class="itin-section" id="itinSection"></div>
</div>

<div class="section-content" id="sec-transport">
<div class="transport-section"><h3>이동수단 상세 & 예매 링크</h3>
<div style="overflow-x:auto;-webkit-overflow-scrolling:touch"><table class="t-table" id="transportTable"><thead><tr><th>DAY</th><th>구간</th><th>수단</th><th>소요</th><th>비용(2인)</th><th>예매</th></tr></thead><tbody id="transportBody"></tbody></table></div></div>
</div>

<div class="section-content" id="sec-hotel">
<div class="hotel-section"><h3 id="hotelTitle">숙소 추천</h3><div id="hotelContent"></div></div>
</div>

<div class="section-content" id="sec-budget">
<div class="budget-section"><h3 id="budgetTitle">예산 (2인 기준)</h3>
<div id="budgetBars"></div><div class="budget-total" id="budgetTotal"></div></div>
</div>

<div class="section-content" id="sec-compare">
<div class="compare-section"><h3>3개 코스 비교</h3><div class="compare-grid" id="compareGrid"></div></div>
</div>

<footer>Italy Trip Planner 2026 v4 | Google Maps 길찾기 + 바티칸 새벽 + 몬테로쏘 수영</footer>

<script>
// ===================== DATA =====================
const COURSES = {
A: {
  name:"코스 A: 나폴리/아말피 (마테라 제외)",sub:"피렌체 3박+피사 당일치기",
  nights:"Roma(2)+Napoli(1)+Sorrento(2)+Firenze(3)+Venezia(1)+Dolomiti(2)+Milano(1)=12N",

  return L.divIcon({className:'',html:`<div style="background:${color};color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.3)">${num}</div>`,iconSize:[24,24],iconAnchor:[12,12],popupAnchor:[0,-14]});

function init(){
  const ct=document.getElementById('courseTabs');ct.innerHTML='';
  Object.keys(COURSES).forEach(id=>{const c=COURSES[id];const d=document.createElement('div');d.className='course-tab'+(id===currentCourse?' active':'');d.dataset.course=id;d.innerHTML=`코스 ${id}<span class="sub">${c.sub}</span>`;d.onclick=()=>switchCourse(id);ct.appendChild(d);});
  const st=document.getElementById('secTabs');st.innerHTML='';
  SEC_LIST.forEach(s=>{const d=document.createElement('div');d.className='sec-tab'+(s.id==='overview'?' active':'');d.dataset.sec=s.id;d.textContent=s.l;d.onclick=()=>{document.querySelectorAll('.sec-tab').forEach(x=>x.classList.remove('active'));d.classList.add('active');document.querySelectorAll('.section-content').forEach(x=>x.classList.remove('active'));document.getElementById('sec-'+s.id).classList.add('active');if(s.id==='overview'&&map)map.invalidateSize();if(s.id==='itinerary'&&dayMap)setTimeout(()=>dayMap.invalidateSize(),100);};st.appendChild(d);});
  document.getElementById('sec-overview').classList.add('active');
  switchCourse('A');
}

function switchCourse(id){
  currentCourse=id;
  document.querySelectorAll('.course-tab').forEach(t=>t.classList.toggle('active',t.dataset.course===id));
  const c=COURSES[id];
  updateMap(c);renderRouteFlow(c);renderStats(c);renderCalendar(c);renderItinerary(c);renderTransport(c);renderHotels(c);renderBudget(c);renderCompare();
}

// OVERVIEW MAP
function updateMap(c){
  if(!map){map=L.map('map',{zoomControl:true}).setView([42.5,13],6);L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'OSM/CARTO',maxZoom:18}).addTo(map);}
  markers.forEach(m=>map.removeLayer(m));markers=[];if(routeLine)map.removeLayer(routeLine);
  const cs=c.cities,coords=cs.map(x=>[x.lat,x.lng]);
  routeLine=L.polyline(coords,{color:'#2563eb',weight:2.5,opacity:.5,dashArray:'8 6'}).addTo(map);
  cs.forEach(x=>{const r=x.n===0?4:Math.max(7,x.n*4+3);const m=L.circleMarker([x.lat,x.lng],{radius:r,fillColor:x.color,color:'#333',weight:x.n?2:1,fillOpacity:x.n?.8:.4}).addTo(map);m.bindPopup(`<b style="color:${x.color}">${x.name}</b><br>${x.dates}<br>${x.n?x.n+'박':'경유'}`);markers.push(m);if(x.n>0){const lbl=L.marker([x.lat,x.lng],{icon:L.divIcon({className:'',html:`<div style="color:${x.color};font-size:10px;font-weight:700;text-shadow:1px 1px 2px #fff,-1px -1px 2px #fff;white-space:nowrap">${x.name}(${x.n}N)</div>`,iconAnchor:[-10,5]})}).addTo(map);markers.push(lbl);}});
  map.fitBounds(coords,{padding:[30,30]});
}

// ROUTE FLOW
function renderRouteFlow(c){
  const el=document.getElementById('routeFlow');el.innerHTML='';
  c.cities.forEach((x,i)=>{const d=document.createElement('span');d.className='route-city'+(x.n>0?' overnight':'');d.textContent=x.name+(x.n>0?` (${x.n}N)`:'');el.appendChild(d);if(i<c.cities.length-1){const a=document.createElement('span');a.className='route-arrow';a.textContent='→';el.appendChild(a);}});
  document.getElementById('routeTitle').textContent=c.name;
}

// STATS
function renderStats(c){
  const el=document.getElementById('statsRow'),tot=c.budget.reduce((a,b)=>a+b.a,0);
  el.innerHTML=`<div class="stat"><div class="label">총 예산(2인)</div><div class="value">${Math.round(tot*1500/10000)}만원</div><div class="stat-sub">€${tot.toLocaleString()}</div></div><div class="stat"><div class="label">1인당</div><div class="value">${c.perPerson}만원</div><div class="stat-sub">항공 제외</div></div><div class="stat"><div class="label">도시</div><div class="value">${c.cities.filter(x=>x.n>0).length}</div><div class="stat-sub">숙박 도시</div></div><div class="stat"><div class="label">교통</div><div class="value">€${c.budget[0].a}</div><div class="stat-sub">${c.cities.length>9?'열차+렌터카':'열차+버스'}</div></div><div class="stat"><div class="label">숙박</div><div class="value">€${c.budget[1].a}</div><div class="stat-sub">12박</div></div>`;
}

// CALENDAR
function renderCalendar(c){
  const g=document.getElementById('calGrid');g.innerHTML='';
  ['월','화','수','목','금','토','일'].forEach((h,i)=>{const d=document.createElement('div');d.className='cal-header'+(i===6?' sun':'');d.textContent=h;g.appendChild(d);});
  for(let i=0;i<1;i++){const d=document.createElement('div');d.className='cal-cell empty';g.appendChild(d);}
  for(let day=1;day<=30;day++){const d=document.createElement('div');const dow=(1+day-1)%7;const isTrip=day>=16&&day<=28;const cal=c.calendar[day];d.className='cal-cell'+(isTrip&&cal?' trip':'')+(dow===6?' sun':'');let html=`<div class="cal-date">${day}</div>`;if(cal){html+=`<div class="cal-city">${cal.city}</div>`;if(cal.detail)html+=`<div class="cal-detail">${cal.detail.replace(/\n/g,'<br>')}</div>`;if(cal.transport)html+=`<div class="cal-transport">${cal.transport}</div>`;if(cal.nights)html+=`<div class="cal-nights">${cal.nights}</div>`;}d.innerHTML=html;g.appendChild(d);}
}

// DAY MAP
function initDayMap(){
  if(!dayMap){
    dayMap=L.map('dayMap',{zoomControl:true}).setView([42.5,13],6);
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'OSM/CARTO',maxZoom:18}).addTo(dayMap);
  }
}
function clearDayMap(){
  dayMarkers.forEach(m=>dayMap.removeLayer(m));dayMarkers=[];
  if(dayLine){dayMap.removeLayer(dayLine);dayLine=null;}
}
function toggleRecs(id,evt){
  if(evt)evt.stopPropagation();
  const el=document.getElementById(id);
  if(!el)return;
  el.style.display=el.style.display==='none'?'table-row':'none';
}
function flyToPoint(lat,lng,name){
  if(!dayMap)return;
  dayMap.flyTo([lat,lng],16,{duration:0.5});
  dayMarkers.forEach(m=>{if(m.getLatLng){const ll=m.getLatLng();if(Math.abs(ll.lat-lat)<0.001&&Math.abs(ll.lng-lng)<0.001)m.openPopup();}});
}
function showDayOnMap(day){
  initDayMap();clearDayMap();
  const items=day.sched.filter(s=>s.coords);
  if(items.length===0){dayMap.setView([42.5,13],6);return;}
  const coords=items.map(s=>s.coords);
  let num=0;
  items.forEach(s=>{
    num++;
    const mk=L.marker(s.coords,{icon:createNumberedIcon(num,s.type||'spot')}).addTo(dayMap);
    let popup=`<b>${s.name}</b>`;
    if(s.t)popup=`<span style="color:#d97706;font-weight:700">${s.t}</span> `+popup;
    if(s.desc)popup+=`<br><span style="color:#555;font-size:11px">${s.desc}</span>`;
    if(s.tip)popup+=`<br><span style="color:#92400e;font-size:11px;background:#fffbeb;padding:1px 4px;border-radius:3px">${s.tip}</span>`;
    popup+=`<br><a href="https://www.google.com/maps/search/?api=1&query=${s.coords[0]},${s.coords[1]}" target="_blank" style="display:inline-block;margin-top:4px;background:#1a73e8;color:#fff;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:600;text-decoration:none">📍 Google Maps 열기</a>`;
    mk.bindPopup(popup);
    dayMarkers.push(mk);
  });
  if(coords.length>1){
    dayLine=L.polyline(coords,{color:'#2563eb',weight:2.5,opacity:.6,dashArray:'6 4'}).addTo(dayMap);
  }
  const bounds=L.latLngBounds(coords);
  dayMap.flyToBounds(bounds,{padding:[40,40],maxZoom:14,duration:0.8});
}
function showOverviewOnDayMap(c){
  initDayMap();clearDayMap();
  const cs=c.cities,coords=cs.map(x=>[x.lat,x.lng]);
  cs.forEach(x=>{
    const r=x.n===0?4:Math.max(6,x.n*3+3);
    const m=L.circleMarker([x.lat,x.lng],{radius:r,fillColor:x.color,color:'#333',weight:x.n?2:1,fillOpacity:x.n?.7:.3}).addTo(dayMap);
    m.bindPopup(`<b>${x.name}</b><br>${x.dates}<br>${x.n?x.n+'박':'경유'}`);
    dayMarkers.push(m);
  });
  if(coords.length>1){
    dayLine=L.polyline(coords,{color:'#2563eb',weight:2,opacity:.4,dashArray:'8 6'}).addTo(dayMap);
  }
  dayMap.flyToBounds(coords,{padding:[30,30],maxZoom:7,duration:0.5});
}

// ITINERARY
function renderItinerary(c){
  const el=document.getElementById('itinSection');
  el.innerHTML='<h3 style="font-size:15px;margin-bottom:12px">'+c.name+' — 상세 일정</h3>';
  // layout: map + list
  const layout=document.createElement('div');layout.className='itin-layout';
  const mapWrap=document.createElement('div');mapWrap.className='itin-map-wrap';
  mapWrap.innerHTML='<div id="dayMap"></div>';
  const listWrap=document.createElement('div');listWrap.className='itin-list-wrap';
  layout.appendChild(mapWrap);layout.appendChild(listWrap);el.appendChild(layout);

  c.days.forEach(day=>{const b=document.createElement('div');b.className='day-block';let sh='';
    day.sched.forEach((s,si)=>{
      const tag=s.type==='food'?'<span class="tag-food">FOOD</span>':s.type==='move'?'<span class="tag-move">MOVE</span>':s.type==='spot'?'<span class="tag-spot">SPOT</span>':'';
      const hl=s.type==='hl'?' highlight-row':'';
      const cp=s.type==='hl'?' <span class="tag-couple">💑</span>':'';
      const recs=s.rk?FOOD_RECS[s.rk]:null;
      if(recs){
        const recId=`rec-${currentCourse}-${day.day}-${si}`;
        const rowClick=s.coords?`flyToPoint(${s.coords[0]},${s.coords[1]},'${(s.name||'').replace(/'/g,"\\'")}');`:'';
        sh+=`<tr class="sched-row food-row${hl}" onclick="${rowClick}toggleRecs('${recId}',event)"><td>${s.t}</td><td>${s.name}${tag}${cp}<span class="food-more">▼ ${recs.length}곳 추천</span></td><td>${s.desc||''}</td></tr>`;
        let recsHtml=recs.map((r,ri)=>{
          const mapLink=r.c?`<a class="rec-map" href="https://www.google.com/maps/search/?api=1&query=${r.c[0]},${r.c[1]}" target="_blank" onclick="event.stopPropagation()">📍</a>`:'';
          const flyClick=r.c?`onclick="event.stopPropagation();flyToPoint(${r.c[0]},${r.c[1]},'${r.n.replace(/'/g,"\\'")}')" `:'';
          return `<div class="rec-item${ri===0?' rec-picked':''}" ${flyClick}><span class="rec-num">${ri+1}</span><span class="rec-name">${r.n}</span> <span class="rec-desc">${r.d}</span> <span class="rec-price">${r.p}</span> ${mapLink}</div>`;
        }).join('');
        sh+=`<tr class="food-recs-row" id="${recId}" style="display:none"><td></td><td colspan="2"><div class="food-recs">${recsHtml}</div></td></tr>`;
      } else {
        const rowClick=s.coords?` onclick="flyToPoint(${s.coords[0]},${s.coords[1]},'${(s.name||'').replace(/'/g,"\\'")}')" style="cursor:pointer"`:'';
        sh+=`<tr class="sched-row${hl}"${rowClick}><td>${s.t}</td><td>${s.name}${tag}${cp}</td><td>${s.desc||''}</td></tr>`;
      }
      if(s.tip){sh+=`<tr class="tip-row"><td></td><td colspan="2">${s.tip}</td></tr>`;}
    });
    sh+=`<tr class="cost-row"><td></td><td colspan="2">💰 ${day.cost}</td></tr>`;
    const routeInfo=day.routeSummary?`<span class="day-route-summary">${day.routeSummary}</span>`:'';
    b.innerHTML=`<div class="day-header" onclick="this.classList.toggle('open');if(this.classList.contains('open'))showDayOnMap(COURSES['${currentCourse}'].days[${day.day-1}]);"><div class="left"><span class="day-num">D${day.day}</span><span class="day-date">${day.date}</span><span class="day-city">${day.city}</span><span class="day-theme">${day.theme}</span>${routeInfo}</div><span class="day-toggle">▼</span></div><div class="day-body"><table class="sched-table">${sh}</table></div>`;
    listWrap.appendChild(b);
  });

  // init dayMap after DOM is ready
  setTimeout(()=>{
    dayMap=null;dayMarkers=[];dayLine=null;
    showOverviewOnDayMap(c);
  },50);
}

// TRANSPORT
function renderTransport(c){
  const tb=document.getElementById('transportBody');tb.innerHTML='';
  c.transport.forEach(t=>{const tr=document.createElement('tr');tr.innerHTML=`<td class="day-col">${t.day}</td><td class="route-col">${t.route}</td><td class="mode-col">${t.mode}</td><td>${t.time}</td><td class="cost-col">${t.cost}</td><td>${t.link?`<a class="book-link" href="${t.link}" target="_blank">${t.linkText}</a>`:''}</td>`;tb.appendChild(tr);});
}

// HOTELS
function renderHotels(c){
  const el=document.getElementById('hotelContent');
  document.getElementById('hotelTitle').textContent=c.name+' — 숙소 추천';
  let html='';
  Object.keys(c.hotels).forEach(city=>{
    const hotels=c.hotels[city];
    html+=`<div class="hotel-city"><h4>${city}</h4><div class="hotel-cards">`;
    hotels.forEach(h=>{
      const stars='★'.repeat(h.stars)+'☆'.repeat(5-h.stars);
      const tags=h.tags.map(t=>`<span class="h-tag">${t}</span>`).join('');
      const links=h.links.map(l=>`<a href="${l.u}" target="_blank" class="${l.c}">${l.t}</a>`).join('');
      html+=`<div class="hotel-card"><div class="h-name">${h.name}</div><div class="h-stars">${stars}</div><div class="h-desc">${h.desc}</div><div class="h-price">${h.price} <small>/2인 기준</small></div><div class="h-tags">${tags}</div><div class="h-links">${links}</div></div>`;
    });
    html+=`</div></div>`;
  });
  html+=`<div class="hotel-tip">💡 <strong>예약 팁:</strong> 9월은 성수기! 6개월 전 예약 추천. Booking.com 무료취소 옵션 활용하세요. 가격은 2026년 9월 예상 기준이며 시즌/환율에 따라 변동됩니다.</div>`;
  el.innerHTML=html;
}

// BUDGET
function renderBudget(c){
  const bars=document.getElementById('budgetBars'),tot=c.budget.reduce((a,b)=>a+b.a,0);bars.innerHTML='';
  c.budget.forEach(b=>{const pct=Math.round(b.a/tot*100);const r=document.createElement('div');r.className='b-row';r.innerHTML=`<div class="lbl">${b.l}</div><div class="b-bar-wrap"><div class="b-bar" style="width:${pct}%;background:${b.c}">€${b.a} (${pct}%)</div></div><div class="amt">${Math.round(b.a*1500/10000)}만원</div>`;bars.appendChild(r);});
  document.getElementById('budgetTitle').textContent=c.name+' — 예산 (2인)';
  document.getElementById('budgetTotal').innerHTML=`<div class="item"><div class="val">€${tot.toLocaleString()}</div><div class="lbl">총 예산 (2인)</div></div><div class="item"><div class="val">${Math.round(tot*1500/10000)}만원</div><div class="lbl">원화 환산</div></div><div class="item"><div class="val">${c.perPerson}만원</div><div class="lbl">1인당</div></div>`;
}

// COMPARE
function renderCompare(){
  const g=document.getElementById('compareGrid');g.innerHTML='';
  COMPARE.forEach(c=>{const card=document.createElement('div');card.className='compare-card'+(c.id===currentCourse?' current':'');
    let pros=c.pros.map(p=>`<li>✅ ${p}</li>`).join(''),cons=c.cons.map(p=>`<li>❌ ${p}</li>`).join('');
    card.innerHTML=`${c.id===currentCourse?'<div class="card-badge">현재 선택</div>':''}<h4>${c.name}</h4><div class="card-sub">${c.sub}</div><div class="card-route">${c.route}</div><div class="card-price">${c.krw} <small>/ 2인 (${c.price})</small></div><div style="font-size:11px;color:#666">1인당 ${c.pp} (항공 제외)</div><ul class="pros">${pros}</ul><ul class="cons" style="margin-top:6px">${cons}</ul>`;
    card.onclick=()=>switchCourse(c.id);g.appendChild(card);});
}

init();
</script>
